<svg viewBox="0 0 512 512" width="128" height="128" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Vibrant Premium App Gradient (Sunset / Productivity Vibe) -->
      <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3A1C71" />
        <stop offset="50%" stop-color="#D76D77" />
        <stop offset="100%" stop-color="#FFAF7B" />
      </linearGradient>
      <!-- Clock Gold/Orange Gradient -->
      <linearGradient id="clockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FFD700" />
        <stop offset="100%" stop-color="#FF7B00" />
      </linearGradient>
      <!-- Neon Mint Lizard Gradient -->
      <linearGradient id="lizGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00FFA3" />
        <stop offset="100%" stop-color="#00B8D4" />
      </linearGradient>
      <linearGradient id="lizDark" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00C853" />
        <stop offset="100%" stop-color="#0091EA" />
      </linearGradient>
      
      <!-- Filters -->
      <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="18" stdDeviation="15" flood-color="#000000" flood-opacity="0.35"/>
      </filter>
      <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
      </filter>
    </defs>

    
    <style>
      @keyframes floatGroup {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      @keyframes ringBell {
        0%, 100% { transform: rotate(0deg); }
        5%, 15%, 25%, 35%, 45% { transform: rotate(-6deg); }
        10%, 20%, 30%, 40% { transform: rotate(6deg); }
        50%, 100% { transform: rotate(0deg); }
      }
      @keyframes glowPulse {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(255,152,0,0.4)); }
        50% { filter: drop-shadow(0 0 30px rgba(255,152,0,0.9)); }
      }
      @keyframes tailWag {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(8deg); }
      }
      @keyframes starTwinkle {
        0%, 100% { opacity: 0.2; transform: scale(1) translateY(0px); }
        50% { opacity: 0.9; transform: scale(1.3) translateY(-10px); }
      }
      .anim-float { animation: floatGroup 6s ease-in-out infinite; transform-origin: center; }
      .anim-shake { animation: ringBell 5s ease-in-out infinite; transform-origin: 256px 270px; }
      .anim-glow { animation: glowPulse 3s infinite; }
      .anim-tail { animation: tailWag 4s ease-in-out infinite; transform-origin: 150px 300px; }
      .anim-star { animation: starTwinkle 4s ease-in-out infinite; }
      .star-delay-1 { animation-delay: 1.5s; }
      .star-delay-2 { animation-delay: 2.5s; }
    </style>
  

    <!-- Background -->
    <rect width="512" height="512" rx="28" fill="url(#bgGrad)" />

    <!-- Ambient Floating Stars in Splash -->
    

    <g transform="translate(0, 0)">
      <g class="anim-float">
        <!-- Main Clock Group with Shake Animation -->
        <g class="" filter="url(#shadow)">
          <!-- Left Bell -->
          <path d="M 180,150 C 130,140 120,200 130,220 L 195,190 Z" fill="url(#clockGrad)"/>
          <circle cx="165" cy="145" r="35" fill="url(#clockGrad)"/>
          <!-- Right Bell -->
          <path d="M 332,150 C 382,140 392,200 382,220 L 317,190 Z" fill="url(#clockGrad)"/>
          <circle cx="347" cy="145" r="35" fill="url(#clockGrad)"/>
          
          <!-- Feet -->
          <path d="M 180,360 L 160,400 L 190,400 Z" fill="url(#clockGrad)"/>
          <path d="M 332,360 L 322,400 L 352,400 Z" fill="url(#clockGrad)"/>
          
          <!-- Clock Outer Ring -->
          <circle cx="256" cy="260" r="130" fill="url(#clockGrad)" class="anim-glow"/>
          
          <!-- Clock Inner Face -->
          <circle cx="256" cy="260" r="105" fill="#FFFFFF"/>
          
          <!-- Clock Tick Marks -->
          <line x1="256" y1="165" x2="256" y2="185" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>
          <line x1="256" y1="355" x2="256" y2="335" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>
          <line x1="165" y1="260" x2="185" y2="260" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>
          <line x1="347" y1="260" x2="327" y2="260" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>

          <!-- Giant Friendly Checkmark (Hands of the clock) -->
          <path d="M 210,260 L 245,295 L 315,225" stroke="#FF7B00" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#softShadow)"/>
          <circle cx="256" cy="260" r="14" fill="#FFD700"/>
        </g>

        <!-- Cute Lizard Mascot hugging the clock -->
        <!-- Tail Wrapping down -->
        <g class="anim-tail" filter="url(#softShadow)">
          <path d="M 125,230 C 50,300 70,430 150,440 C 190,445 220,400 170,380 C 130,360 110,310 145,270" stroke="url(#lizDark)" stroke-width="26" stroke-linecap="round" fill="none"/>
        </g>

        <!-- Body Clinging to the side left -->
        <g filter="url(#shadow)" class="">
          <!-- Lizard Body Arc -->
          <path d="M 125,230 C 100,150 150,110 200,120 C 160,180 170,220 125,230 Z" fill="url(#lizGrad)"/>

          <!-- Head peeking over the top left -->
          <ellipse cx="230" cy="110" rx="42" ry="32" transform="rotate(-15 230 110)" fill="url(#lizGrad)"/>
          
          <!-- Cute Anime Eyes (Big) -->
          <ellipse cx="215" cy="100" rx="14" ry="18" fill="#FFFFFF" transform="rotate(10 215 100)"/>
          <ellipse cx="255" cy="108" rx="12" ry="16" fill="#FFFFFF" transform="rotate(20 255 108)"/>
          
          <!-- Pupils -->
          <circle cx="218" cy="100" r="8" fill="#1A1025"/>
          <circle cx="257" cy="108" r="7" fill="#1A1025"/>
          
          <!-- Eye Catchlights -->
          <circle cx="214" cy="95" r="3" fill="#FFFFFF"/>
          <circle cx="254" cy="104" r="2.5" fill="#FFFFFF"/>

          <!-- Tiny Smile -->
          <path d="M 225,125 Q 240,135 250,127" stroke="#1A1025" stroke-width="3" stroke-linecap="round" fill="none"/>
          
          <!-- Cute Cheek Blush -->
          <ellipse cx="202" cy="115" rx="6" ry="4" stroke="none" fill="#FF5252" opacity="0.5" transform="rotate(-10 202 115)"/>
          <ellipse cx="265" cy="120" rx="5" ry="3" stroke="none" fill="#FF5252" opacity="0.5" transform="rotate(5 265 120)"/>

          <!-- Little Clinging Hands -->
          <!-- Paw Top -->
          <g fill="#00B8D4">
            <circle cx="180" cy="135" r="8"/>
            <circle cx="195" cy="140" r="8"/>
            <circle cx="188" cy="150" r="8"/>
          </g>
          <!-- Paw Bottom -->
          <g fill="#00FFA3">
            <circle cx="115" cy="245" r="7"/>
            <circle cx="125" cy="265" r="7"/>
          </g>
        </g>
      </g>
    </g>

    
  </svg>